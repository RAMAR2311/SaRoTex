{% extends "base.html" %}

{% block content %}
<style>
    /* Fondo limpio que mantiene la legibilidad */
    body {
        background-color: var(--brand-bg) !important;
        background-image: linear-gradient(135deg, var(--brand-bg) 0%, #eef3f5 100%);
    }

    /* Opcional: Ocultar la barra solo en login */
    .navbar-custom {
        display: none !important;
    }
</style>

<div class="row align-items-center justify-content-evenly" style="min-height: 85vh;">
    <!-- Columna Izquierda: Cuadro de Acceso Segregado -->
    <div class="col-md-6 col-lg-5 mb-4">
        <div class="card card-custom p-5 border-0 shadow-lg rounded-4" style="background-color: white; border-top: 5px solid var(--brand-gold) !important;">
            <div class="text-center mb-5">
                <h3 class="fw-bold text-brand-black">Acceso al Panel</h3>
                <p class="text-muted">Introduce tus credenciales operativas</p>
            </div>
            
            <form method="POST" action="/auth/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-4">
                    <label class="form-label fw-bold text-brand-black">Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg bg-light border-0" name="email" required placeholder="tu@sarotex.com">
                </div>
                
                <div class="mb-5">
                    <label class="form-label fw-bold text-brand-black">Contraseña</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0" name="password" required placeholder="••••••••">
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                        Ingresar <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Columna Derecha: Logo Central y Limpio -->
    <div class="col-md-6 col-lg-6 d-none d-md-flex flex-column justify-content-center align-items-center text-center">
        <img src="{{ url_for('static', filename='img/saro-icon.jpeg') }}" 
             alt="Logo SaRo Tex" 
             class="img-fluid rounded-4 shadow-lg" 
             style="max-width: 380px; width: 100%; object-fit: cover;">
        <h2 class="mt-4 fw-bold" style="font-family: 'Playfair Display', serif; color: var(--brand-gold); letter-spacing: -1px;">SaRo Tex</h2>
        <p style="font-size: 1.1rem; color: var(--brand-dark-gold); font-weight: 500; letter-spacing: 2px; text-transform: uppercase;">Lenceria para tu hogar.</p>
    </div>
</div>
{% endblock %}
